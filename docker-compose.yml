services:
  postgres:
    image: postgres:16-alpine
    container_name: flowpedia-postgres
    environment:
      POSTGRES_USER: flowpedia
      POSTGRES_PASSWORD: flowpedia
      POSTGRES_DB: flowpedia
    ports:
      # Host 5433 to avoid clashing with a local Postgres on the default 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpedia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowpedia-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
